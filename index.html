<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEN 10 STORY GAME</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">    
    <link rel="stylesheet" href="css/map.css">    

</head>

<body>
    <div id="menuScene" class="scene">
        <div class="menu-container">
            <h1 class="game-title">
                BEN 10
            </h1>

            <h2 class="game-subtitle">
                STORY MODE
            </h2>

            <button class="menu-btn" id="newgamebtn">
                ▶ NEW GAME
            </button>

            <button class="menu-btn" id="continuebtn">
                ▶ CONTINUE
            </button>

            <button class="menu-btn" id="aliensbtn">
                👽 YOUR ALIENS
            </button>

            <button class="menu-btn" id="settingsbtn">
                ⚙ SETTINGS
            </button>

            <p class="version">
                Version 0.1
            </p>

        </div>

    </div>

    <div id="mapScene" class="scene">

        <div class="map-container">
            <h1 class="map-title">
                Season 1
            </h1> 

            <div id="chapterlist"></div>

            <button class="menu-btn" id="mapbackbtn">
                ← Back
            </button>

        </div>
    </div>

    <div id="battleScene" class="scene">

        <h1>Battle</h1>

    </div>

    <div id="storyScene" class="scene">

        <h1>Story</h1>

    </div>

    <div id="rewardScene" class="scene">

        <h1>Rewards</h1>

    </div>

    <div id="settingsScene" class="scene">

        <h1>Settings</h1>
        <button id="backbtn">
            ← back
        </button>

    </div>
</body>

<script src="js/config.js"></script>
<script src="js/chapters.js"></script>
<script src="js/save.js"></script>
<script src="js/menu.js"></script>
<script src="js/ui.js"></script>
<script src="js/chapter.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>

</html>
